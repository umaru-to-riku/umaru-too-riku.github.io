        <!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./target.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-sphere position="0 0 0" radius="0.3" color="red"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true">
        </a-sphere>
        <a-box id="danger-target" position="0.5 0.5 0"
          width="0.2" height="0.2" depth="0.2" color="blue">
        </a-box>
      </a-entity>
    </a-scene>

    <script>
      // タッチ・クリック両対応
      const target = document.querySelector('#danger-target');
      target.addEventListener('click', () => {
        alert('【解説】火災時にエレベーターを使ってはいけません！階段で避難しましょう。');
      });

      // スマホ用タッチイベント
      target.addEventListener('touchstart', () => {
        alert('【解説】火災時にエレベーターを使ってはいけません！階段で避難しましょう。');
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./target.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <!-- タッチ対応raycaster追加 -->
      <a-camera position="0 0 0" look-controls="enabled: false"
        raycaster="objects: .clickable"
        cursor="rayOrigin: mouse; fuse: false">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-sphere position="0 0 0" radius="0.3" color="red"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 500; loop: true">
        </a-sphere>

        <!-- clickableクラスを追加 -->
        <a-box id="danger-target" class="clickable"
          position="0.5 0.5 0"
          width="0.2" height="0.2" depth="0.2" color="blue">
        </a-box>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('touch-handler', {
        init: function () {
          const el = this.el;
          const canvas = document.querySelector('canvas');

          canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();

            // タッチ座標を正規化（-1〜1）
            const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            const camera = document.querySelector('a-camera').object3D.children[0];
            raycaster.setFromCamera({ x, y }, camera);

            const target = document.querySelector('#danger-target').object3D;
            const intersects = raycaster.intersectObject(target, true);

            if (intersects.length > 0) {
              alert('【解説】火災時にエレベーターを使ってはいけません！階段で避難しましょう。');
            }
          });
        }
      });
    </script>

    <script>
      // シーン読み込み後にコンポーネント登録
      document.querySelector('a-scene').addEventListener('loaded', () => {
        document.querySelector('a-scene').setAttribute('touch-handler', '');
      });
    </script>
  </body>
</html>

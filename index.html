<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.x/dist/aframe-particle-system-component.min.js"></script>
    <style>
      #message {
        opacity: 0;
        transition: opacity 0.5s;
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 20px 30px;
        border-radius: 12px;
        font-size: 18px;
        text-align: center;
        z-index: 9999;
        width: 80%;
      }
    </style>
  </head>
  <body>
    <div id="message">【解説】火災時にエレベーターを使ってはいけません！階段で避難しましょう。</div>

    <a-scene
      mindar-image="imageTargetSrc: ./target.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-entity
          position="0 0 0"
          particle-system="preset: default; color: #ff4400,#ff8800,#ffcc00; particleCount: 300; maxAge: 1.5; velocityValue: 0 2 0; velocitySpread: 0.5 0.5 0.5; size: 0.15; opacity: 0.8; blending: additive; accelerationValue: 0 0.5 0">
        </a-entity>

        <a-box id="danger-target"
          position="0 0.3 0"
          width="0.6" height="0.6" depth="0.6"
          material="opacity: 0; transparent: true">
        </a-box>

      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const msg = document.getElementById('message');

      scene.addEventListener('loaded', () => {
        const canvas = scene.canvas;

        canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const rect = canvas.getBoundingClientRect();
          const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
          const y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;

          const camera = scene.camera;
          const raycaster = new THREE.Raycaster();
          raycaster.setFromCamera({ x, y }, camera);

          const box = document.querySelector('#danger-target').object3D;
          const intersects = raycaster.intersectObject(box, true);

          if (intersects.length > 0) {
            msg.style.opacity = '1';
            setTimeout(() => {
              msg.style.opacity = '0';
            }, 3000);
          }
        }, { passive: false });
      });
    </script>
  </body>
</html>
